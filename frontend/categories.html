<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiliSum - 智能分类浏览器</title>
<style>
/* ==========================================================================
   BiliSum Smart-Categorize v2.0 - Classification Browser Styles
   Cross-utilization: notebooklm group colors, multi-search-engine query chips,
   bili-note tag badges
   ========================================================================== */

:root {
  /* 12 category colors */
  --cat-tech: #3b82f6;
  --cat-entertainment: #f59e0b;
  --cat-education: #10b981;
  --cat-lifestyle: #ec4899;
  --cat-gaming: #8b5cf6;
  --cat-music: #ef4444;
  --cat-film: #06b6d4;
  --cat-knowledge: #14b8a6;
  --cat-tutorial: #6366f1;
  --cat-review: #f97316;
  --cat-news: #dc2626;
  --cat-anime: #a855f7;
  --cat-other: #6b7280;

  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-surface: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: #475569;
  --accent: #38bdf8;
  --accent-hover: #0ea5e9;
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header h1 {
  font-size: 1.25rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* Buttons */
.btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text);
  cursor: pointer;
  font-size: 0.875rem;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--border); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0f172a;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.btn-xs { padding: 2px 8px; font-size: 0.7rem; }

/* Layout */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  min-width: 120px;
  flex: 1;
}
.stat-card .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
}
.stat-card .stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Category Grid */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.category-chip {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.8rem;
}
.category-chip:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.category-chip.active {
  border-color: var(--accent);
  background: rgba(56, 189, 248, 0.1);
}
.category-chip .chip-icon {
  font-size: 1.5rem;
  display: block;
  margin-bottom: 4px;
}
.category-chip .chip-count {
  font-size: 0.7rem;
  color: var(--text-muted);
  display: block;
  margin-top: 2px;
}

/* Dimension Filters */
.filters-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 16px;
}
.filter-select {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
}
.filter-select:focus { outline: 2px solid var(--accent); }
.filter-search {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 6px 12px;
  font-size: 0.8rem;
  min-width: 200px;
  flex: 1;
}
.filter-search:focus { outline: 2px solid var(--accent); }

/* Video Cards */
.video-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 14px;
}
.video-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.video-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
.video-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}
.video-card .card-title {
  font-weight: 600;
  font-size: 0.95rem;
  line-height: 1.4;
  flex: 1;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.video-card .card-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.video-card .card-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 500;
  white-space: nowrap;
}
.badge-type-科技 { background: rgba(59,130,246,0.2); color: #60a5fa; }
.badge-type-娱乐 { background: rgba(245,158,11,0.2); color: #fbbf24; }
.badge-type-教育 { background: rgba(16,185,129,0.2); color: #34d399; }
.badge-type-生活 { background: rgba(236,72,153,0.2); color: #f472b6; }
.badge-type-游戏 { background: rgba(139,92,246,0.2); color: #a78bfa; }
.badge-type-音乐 { background: rgba(239,68,68,0.2); color: #fca5a5; }
.badge-type-影视 { background: rgba(6,182,212,0.2); color: #22d3ee; }
.badge-type-知识科普 { background: rgba(20,184,166,0.2); color: #2dd4bf; }
.badge-type-教程 { background: rgba(99,102,241,0.2); color: #818cf8; }
.badge-type-评测 { background: rgba(249,115,22,0.2); color: #fb923c; }
.badge-type-新闻 { background: rgba(220,38,38,0.2); color: #fca5a5; }
.badge-type-动漫 { background: rgba(168,85,247,0.2); color: #c084fc; }
.badge-type-其他, .badge-type-未分类 { background: rgba(107,114,128,0.2); color: #9ca3af; }

.badge-diff-入门 { background: rgba(52,211,153,0.15); color: #34d399; }
.badge-diff-进阶 { background: rgba(251,191,36,0.15); color: #fbbf24; }
.badge-diff-专业 { background: rgba(248,113,113,0.15); color: #f87171; }

.badge-tier-S { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: 700; }
.badge-tier-A { background: rgba(56,189,248,0.15); color: #38bdf8; }
.badge-tier-B { background: rgba(148,163,184,0.15); color: #94a3b8; }
.badge-tier-C { background: rgba(148,163,184,0.1); color: #64748b; }

.badge-tag {
  background: rgba(56,189,248,0.1);
  color: var(--accent);
}

/* Tag Cloud */
.tag-cloud-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.tag-cloud-title {
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 10px;
}
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag-cloud-item {
  padding: 3px 10px;
  border-radius: 16px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
}
.tag-cloud-item:hover {
  border-color: var(--accent);
  background: rgba(56,189,248,0.1);
}

/* Loading & Empty */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
}
.loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center;
  padding: 60px;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}

/* Progress Bar (batch classify) */
.progress-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.progress-dialog {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  min-width: 300px;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--bg-surface);
  border-radius: 4px;
  overflow: hidden;
  margin: 16px 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #818cf8);
  border-radius: 4px;
  transition: width 0.3s ease;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 0.85rem;
  z-index: 300;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .video-list { grid-template-columns: 1fr; }
  .category-grid { grid-template-columns: repeat(4, 1fr); }
  .stats-bar { flex-direction: column; }
}
</style>

<script>
// ==========================================================================
// BiliSum Smart-Categorize v2.0 - Classification Browser Logic
// ==========================================================================

const API_BASE = window.API_BASE || '/api';

// --- State ---
let state = {
  entries: [],
  total: 0,
  stats: null,
  tagCloud: [],
  categoryIndex: {},
  activeType: '',
  page: 1,
  limit: 50,
};

// --- Toast ---
function showToast(msg, ms = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// --- API calls ---
async function apiGet(path) {
  const r = await fetch(`${API_BASE}${path}`);
  const j = await r.json();
  if (!j.success) throw new Error(j.error || '请求失败');
  return j.data;
}

async function apiPost(path, body) {
  const r = await fetch(`${API_BASE}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const msg = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status}: ${msg || r.statusText}`);
  }
  const j = await r.json();
  if (!j.success) throw new Error(j.error || '请求失败');
  return j.data;
}

// --- Load data ---
async function loadStats() {
  try {
    state.stats = await apiGet('/kb/stats-extended');
    renderStats();
  } catch (e) { console.error('Stats load error:', e); }
}

async function loadTagCloud() {
  try {
    state.tagCloud = await apiGet('/kb/tag-cloud?limit=50');
    renderTagCloud();
  } catch (e) { console.error('Tag cloud error:', e); }
}

async function loadEntries() {
  const list = document.getElementById('video-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><div>加载中...</div></div>';

  try {
    const vt = state.activeType ? `&video_type=${encodeURIComponent(state.activeType)}` : '';
    const diff = document.getElementById('filter-difficulty').value;
    const qt = document.getElementById('filter-quality').value;
    const lang = document.getElementById('filter-language').value;
    const dur = document.getElementById('filter-duration').value;
    const src = document.getElementById('filter-source').value;
    const search = document.getElementById('filter-search').value.trim();
    const sortRaw = document.getElementById('filter-sort').value;
    const [sortBy, sortOrder] = sortRaw.split('_');

    let url = `/kb/browse?limit=${state.limit}&offset=${(state.page-1)*state.limit}${vt}`;
    if (diff) url += `&difficulty=${encodeURIComponent(diff)}`;
    if (qt) url += `&quality_tier=${qt}`;
    if (lang) url += `&language=${encodeURIComponent(lang)}`;
    if (dur) url += `&duration_category=${encodeURIComponent(dur)}`;
    if (src) url += `&source=${encodeURIComponent(src)}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    url += `&sort_by=${sortBy}&sort_order=${sortOrder}`;

    const data = await apiGet(url);
    state.entries = data.entries || [];
    state.total = data.total || 0;
    renderEntries();
    renderPagination();
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div>加载失败: ${e.message}</div></div>`;
  }
}

// --- Render ---
function renderStats() {
  if (!state.stats) return;
  const byType = state.stats.byType || {};
  document.getElementById('stat-total').textContent = state.stats.totalVideos || 0;
  const classified = (state.stats.totalVideos || 0) - (state.stats.unclassified || 0);
  document.getElementById('stat-classified').textContent = classified;
  document.getElementById('stat-rate').textContent = (state.stats.classificationRate || 0) + '%';
  const totalTags = Object.values(byType).reduce((s, v) => s + v, 0);
  document.getElementById('stat-tags').textContent = Object.keys(byType).length;

  // Render category grid
  renderCategoryGrid(byType);
}

function renderCategoryGrid(byType) {
  const grid = document.getElementById('category-grid');
  const categoryMeta = {
    '科技': { icon: '💻', color: 'var(--cat-tech)' },
    '娱乐': { icon: '🎭', color: 'var(--cat-entertainment)' },
    '教育': { icon: '📚', color: 'var(--cat-education)' },
    '生活': { icon: '🏠', color: 'var(--cat-lifestyle)' },
    '游戏': { icon: '🎮', color: 'var(--cat-gaming)' },
    '音乐': { icon: '🎵', color: 'var(--cat-music)' },
    '影视': { icon: '🎬', color: 'var(--cat-film)' },
    '知识科普': { icon: '🔬', color: 'var(--cat-knowledge)' },
    '教程': { icon: '📖', color: 'var(--cat-tutorial)' },
    '评测': { icon: '⭐', color: 'var(--cat-review)' },
    '新闻': { icon: '📰', color: 'var(--cat-news)' },
    '动漫': { icon: '🎨', color: 'var(--cat-anime)' },
    '其他': { icon: '📁', color: 'var(--cat-other)' },
    '未分类': { icon: '❓', color: 'var(--cat-other)' },
  };

  let html = '';
  for (const [type, count] of Object.entries(byType)) {
    const meta = categoryMeta[type] || { icon: '📁', color: 'var(--cat-other)' };
    const active = state.activeType === type ? ' active' : '';
    html += `
      <div class="category-chip${active} category-chip-item" data-category="${escapeHtml(type)}">
        <span class="chip-icon">${meta.icon}</span>
        ${escapeHtml(type)}
        <span class="chip-count">${count} 个</span>
      </div>`;
  }
  grid.innerHTML = html;

  // Event delegation for category chips
  grid.onclick = (e) => {
    const chip = e.target.closest('.category-chip-item');
    if (!chip) return;
    const type = chip.getAttribute('data-category');
    selectCategory(type);
  };
}

function renderTagCloud() {
  const section = document.getElementById('tag-cloud-section');
  const cloud = document.getElementById('tag-cloud');
  if (!state.tagCloud.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  const maxCount = state.tagCloud[0]?.count || 1;
  cloud.innerHTML = state.tagCloud.map(t => {
    const size = 0.7 + t.weight * 0.8; // 0.7rem to 1.5rem
    const hue = 200 + t.weight * 40; // blue to purple
    return `<span class="tag-cloud-item tag-cloud-chip" style="font-size:${size}rem; background: hsla(${hue},70%,60%,${0.08+t.weight*0.12})"
      data-tag="${escapeHtml(t.tag)}" title="${t.count} 个视频">${escapeHtml(t.tag)}</span>`;
  }).join('');

  // Event delegation for tag cloud
  cloud.onclick = (e) => {
    const chip = e.target.closest('.tag-cloud-chip');
    if (!chip) return;
    const tag = chip.getAttribute('data-tag');
    filterByTag(tag);
  };
}

function renderEntries() {
  const list = document.getElementById('video-list');
  if (!state.entries.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div>${state.activeType ? '该分类下暂无视频' : '知识库为空，请先保存视频'}</div>
    </div>`;
    return;
  }

  list.innerHTML = state.entries.map(e => {
    const typeClass = e.video_type || '未分类';
    const badges = [
      `<span class="badge badge-type-${typeClass}">${typeClass}</span>`,
      e.difficulty ? `<span class="badge badge-diff-${e.difficulty}">${e.difficulty}</span>` : '',
      e.quality_tier ? `<span class="badge badge-tier-${e.quality_tier}">${e.quality_tier}级</span>` : '',
      e.language ? `<span class="badge">${e.language}</span>` : '',
      e.duration_category ? `<span class="badge">${e.duration_category}</span>` : '',
    ].filter(Boolean).join('');

    const tagBadges = (e.tags || []).slice(0, 4).map(t =>
      `<span class="badge badge-tag">${t}</span>`
    ).join('');

    const url = `https://www.bilibili.com/video/${e.bvid}`;
    const savedDate = e.savedAt ? new Date(e.savedAt).toLocaleDateString('zh-CN') : '';

    return `
      <div class="video-card" onclick="window.open('${url}','_blank')">
        <div class="card-header">
          <div class="card-title">${escapeHtml(e.title)}</div>
        </div>
        <div class="card-meta">
          👤 ${escapeHtml(e.author || '未知')} &nbsp;|&nbsp;
          📅 ${savedDate} &nbsp;|&nbsp;
          📏 ${(e.textLength || 0).toLocaleString()} 字
          ${e.topic ? `&nbsp;|&nbsp;📌 ${escapeHtml(e.topic)}` : ''}
        </div>
        <div class="card-badges">${badges}${tagBadges}</div>
        <div style="text-align:right;">
          <button class="btn btn-xs" onclick="event.stopPropagation();reclassify('${e.bvid}')" title="重新分类">
            🔄 重分类
          </button>
        </div>
      </div>`;
  }).join('');
}

function renderPagination() {
  const totalPages = Math.ceil(state.total / state.limit);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  for (let i = 1; i <= Math.min(totalPages, 10); i++) {
    const active = i === state.page ? 'btn-primary' : '';
    html += `<button class="btn btn-sm ${active} pagination-btn" data-page="${i}">${i}</button>`;
  }
  if (totalPages > 10) html += `<span style="color:var(--text-muted)">...${totalPages}</span>`;
  pag.innerHTML = html;

  // Event delegation for pagination
  pag.onclick = (e) => {
    const btn = e.target.closest('.pagination-btn');
    if (!btn) return;
    const n = parseInt(btn.getAttribute('data-page'));
    if (!isNaN(n)) goPage(n);
  };
}

function renderActiveFilters() {
  const container = document.getElementById('active-filters');
  const chips = [];
  if (state.activeType) chips.push({ label: state.activeType, action: 'clear-category' });
  const diff = document.getElementById('filter-difficulty').value;
  if (diff) chips.push({ label: diff, action: 'clear-difficulty' });
  const qt = document.getElementById('filter-quality').value;
  if (qt) chips.push({ label: qt+'级', action: 'clear-quality' });

  container.innerHTML = chips.map(c =>
    `<span class="badge badge-tag active-filter-chip" style="cursor:pointer" data-action="${c.action}">${escapeHtml(c.label)} ✕</span>`
  ).join('');

  // Event delegation: one listener on the container, not individual inline onclick
  container.onclick = (e) => {
    const chip = e.target.closest('.active-filter-chip');
    if (!chip) return;
    const action = chip.getAttribute('data-action');
    clearActiveFilter(action);
  };
}

function clearActiveFilter(action) {
  switch (action) {
    case 'clear-category': selectCategory(''); break;
    case 'clear-difficulty': document.getElementById('filter-difficulty').value=''; applyFilters(); break;
    case 'clear-quality': document.getElementById('filter-quality').value=''; applyFilters(); break;
  }
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// --- Actions ---
function selectCategory(type) {
  state.activeType = state.activeType === type ? '' : type;
  state.page = 1;
  applyFilters();
}

function filterByTag(tag) {
  state.activeType = '';
  document.getElementById('filter-search').value = '';
  state.page = 1;
  // Use tag filter via the browse endpoint's tag parameter
  loadEntriesByTag(tag);
}

async function loadEntriesByTag(tag) {
  const list = document.getElementById('video-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><div>加载中...</div></div>';
  try {
    const data = await apiGet(`/kb/browse?tag=${encodeURIComponent(tag)}&limit=50`);
    state.entries = data.entries || [];
    state.total = data.total || 0;
    renderEntries();
    renderPagination();
    renderActiveFilters();
  } catch (e) {
    list.innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

let searchTimer;
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.page = 1; applyFilters(); }, 400);
}

function applyFilters() {
  state.page = 1;
  renderActiveFilters();
  loadEntries();
}

function goPage(n) {
  state.page = n;
  loadEntries();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function reclassify(bvid) {
  try {
    showToast('正在重新分类...');
    const data = await apiPost('/kb/classify-and-tag', { bvid, force_refresh: true });
    showToast(`分类完成: ${data.classification.video_type}`);
    loadEntries();
    loadStats();
    loadTagCloud();
  } catch (e) {
    showToast('分类失败: ' + e.message);
  }
}

async function batchClassifyUnclassified() {
  const overlay = document.getElementById('progress-overlay');
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');
  const btn = document.getElementById('btn-batch-classify');

  overlay.style.display = 'flex';
  fill.style.width = '0%';
  text.textContent = '正在获取未分类视频...';
  btn.disabled = true;

  try {
    const data = await apiPost('/kb/classify-batch', {
      bvids: [],  // empty = all unclassified
      max_concurrent: 3,
    });
    fill.style.width = '100%';
    text.textContent = `完成! 共分类 ${data.classified} / ${data.total} 个视频`;
    showToast(`批量分类完成: ${data.classified} 个视频`);
    await loadAll();
  } catch (e) {
    text.textContent = '分类失败: ' + e.message;
    showToast('批量分类失败: ' + e.message);
  } finally {
    btn.disabled = false;
    setTimeout(() => { overlay.style.display = 'none'; }, 1500);
  }
}

async function refreshData() {
  await loadAll();
  showToast('数据已刷新');
}

async function loadAll() {
  await Promise.all([loadStats(), loadTagCloud(), loadEntries()]);
}

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  loadAll();
});
</script>

</body>
</html>
