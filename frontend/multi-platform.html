<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiliSum · 多平台导入</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/enhancements.css">
<style>
    /* ===== Page-specific layout ===== */
    .import-layout {
        display: flex; flex-direction: column; height: calc(100vh - 52px);
        max-width: 960px; margin: 0 auto; padding: 24px 16px;
        gap: 16px;
    }

    /* ===== Hero / input section ===== */
    .import-hero {
        text-align: center; padding: 28px 24px;
        background: linear-gradient(135deg, var(--coral-50), var(--sky-50));
        border-radius: var(--radius-xl); border: 1px solid var(--border);
        flex-shrink: 0;
    }
    .import-hero h2 { font-size: var(--text-h2); color: var(--coral-700); margin-bottom: 6px; }
    .import-hero p { font-size: var(--text-body-sm); color: var(--text-muted); margin-bottom: 16px; }

    /* ===== URL input row ===== */
    .url-row {
        display: flex; gap: 8px; align-items: center; justify-content: center;
        flex-wrap: wrap;
    }
    .url-row .input {
        flex: 1; min-width: 280px; max-width: 520px;
        font-size: var(--text-body); padding: 10px 14px;
        border: 2px solid var(--border); border-radius: var(--radius-pill);
        background: var(--surface); transition: border-color var(--duration-fast) var(--ease-out);
    }
    .url-row .input:focus {
        border-color: var(--brand-primary); outline: none;
        box-shadow: var(--glow-sky);
    }
    .url-row .btn-import {
        padding: 10px 24px; font-size: var(--text-body); font-weight: var(--weight-semibold);
        border-radius: var(--radius-pill); white-space: nowrap;
    }

    /* ===== Platform auto-detect badge ===== */
    .platform-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: var(--radius-pill);
        font-size: var(--text-caption); font-weight: var(--weight-semibold);
        margin-left: 8px; vertical-align: middle;
        transition: all var(--duration-base) var(--ease-out);
    }
    .platform-badge.bilibili  { background: var(--coral-100); color: var(--coral-700); }
    .platform-badge.youtube   { background: #fef2f2; color: #dc2626; }
    .platform-badge.direct    { background: var(--sky-100); color: var(--sky-800); }
    .platform-badge.unknown   { background: var(--neutral-100); color: var(--neutral-500); }

    /* ===== Supported platforms hint ===== */
    .platform-hints {
        display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
        margin-top: 10px; font-size: var(--text-caption); color: var(--text-muted);
    }
    .platform-hints span { opacity: 0.7; }

    /* ===== Progress section ===== */
    .progress-section {
        display: none; background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: 18px 20px; flex-shrink: 0;
    }
    .progress-section.active { display: block; }

    .progress-steps {
        display: flex; gap: 0; align-items: flex-start; justify-content: space-between;
        position: relative; padding: 0 4px;
    }
    /* Connector line */
    .progress-steps::before {
        content: ""; position: absolute; top: 14px; left: 28px; right: 28px;
        height: 2px; background: var(--neutral-200); z-index: 0;
    }
    .progress-step {
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        flex: 1; position: relative; z-index: 1;
    }
    .step-dot {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--surface); border: 2px solid var(--neutral-200);
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: var(--weight-bold);
        transition: all var(--duration-base) var(--ease-out);
    }
    .progress-step.completed .step-dot {
        background: var(--brand-primary); border-color: var(--brand-primary); color: #fff;
    }
    .progress-step.active .step-dot {
        background: var(--sky-50); border-color: var(--brand-primary); color: var(--brand-primary);
        animation: stepPulse 1.5s ease-in-out infinite;
    }
    .progress-step.error .step-dot {
        background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger);
    }
    @keyframes stepPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(126, 184, 218, 0.4); }
        50%      { box-shadow: 0 0 0 8px rgba(126, 184, 218, 0); }
    }
    .step-label {
        font-size: var(--text-caption); color: var(--text-muted); text-align: center;
        max-width: 80px; line-height: 1.3;
    }
    .progress-step.completed .step-label { color: var(--text-secondary); }
    .progress-step.active .step-label     { color: var(--brand-primary); font-weight: var(--weight-semibold); }
    .progress-step.error .step-label      { color: var(--danger); }

    .progress-message {
        text-align: center; font-size: var(--text-body-sm); color: var(--text-secondary);
        margin-top: 12px; min-height: 20px;
    }

    /* ===== Result preview section ===== */
    .result-section {
        display: none; flex: 1; min-height: 0; overflow: hidden;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg);
    }
    .result-section.active { display: flex; flex-direction: column; }

    .result-toolbar {
        display: flex; gap: 0; border-bottom: 1px solid var(--border);
        padding: 0 16px; flex-shrink: 0;
    }
    .result-tab {
        padding: 10px 16px; font-size: var(--text-body-sm); font-weight: var(--weight-medium);
        color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
        background: none; border-top: none; border-left: none; border-right: none;
        transition: all var(--duration-fast) var(--ease-out);
    }
    .result-tab:hover { color: var(--text-primary); }
    .result-tab.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); }

    .result-body {
        flex: 1; overflow-y: auto; padding: 20px; min-height: 0;
    }

    /* Result content styles */
    .result-meta {
        display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
        margin-bottom: 16px; font-size: var(--text-caption); color: var(--text-muted);
    }
    .result-meta .video-title { font-size: var(--text-body); font-weight: var(--weight-semibold); color: var(--text-primary); }
    .result-overview { line-height: var(--leading-relaxed); margin-bottom: 18px; color: var(--text-primary); }

    .result-section-title {
        font-size: var(--text-body); font-weight: var(--weight-semibold);
        color: var(--brand-primary); margin: 18px 0 8px 0;
        padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .result-section-title:first-child { margin-top: 0; }

    .result-list { padding-left: 20px; margin: 0; }
    .result-list li { margin-bottom: 6px; font-size: var(--text-body-sm); line-height: var(--leading-body); color: var(--text-primary); }

    .result-logic-flow-item { margin-bottom: 12px; }
    .result-logic-flow-item strong { color: var(--coral-600); }

    .result-empty {
        text-align: center; padding: 40px 20px; color: var(--text-muted);
        font-size: var(--text-body);
    }

    /* ===== KB action bar ===== */
    .result-actions {
        display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px;
        border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* ===== Transcript pane ===== */
    .transcript-list { max-height: 100%; overflow-y: auto; }
    .transcript-item {
        display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--neutral-100);
        font-size: var(--text-body-sm); line-height: var(--leading-body);
    }
    .transcript-time {
        flex-shrink: 0; min-width: 54px; color: var(--text-muted);
        font-variant-numeric: tabular-nums; font-size: var(--text-caption);
    }
    .transcript-text { flex: 1; color: var(--text-primary); }

    /* ===== Action checkbox row for multi-step ===== */
    .option-row {
        display: flex; gap: 16px; align-items: center; justify-content: center;
        flex-wrap: wrap; margin-top: 8px;
    }
    .option-row label {
        display: flex; align-items: center; gap: 4px;
        font-size: var(--text-caption); color: var(--text-secondary); cursor: pointer;
    }

    /* Responsive */
    @media (max-width: 640px) {
        .import-layout { padding: 12px 8px; }
        .url-row .input { min-width: 200px; }
        .progress-steps { gap: 4px; }
        .step-label { font-size: 10px; max-width: 60px; }
    }
</style>
</head>
<body>

<div class="app-shell">
    <!-- Top Bar -->
    <header class="app-topbar">
        <div style="display:flex;align-items:center;gap:10px;position:relative">
            <button class="hamburger-btn" id="hamburgerBtn" title="菜单">&#9776;</button>
            <div class="brand" onclick="location.href='/browse'">
                <span class="brand-mark">&#x1F4FA;</span>
                <span class="brand-title">BiliSum</span>
                <span class="brand-subtitle">多平台导入</span>
            </div>
            <div class="hamburger-menu" id="hamburgerMenu">
                <a href="/browse">&#x1F3E0; 首页&#xB7;B站浏览</a>
                <a href="/summary">&#x1F916; AI总结</a>
                <a href="/kb">&#x1F4DA; 知识库</a>
                <a href="/favorites">&#x1F4C1; 收藏夹同步</a>
                <a href="/tools">&#x1F6E0;&#xFE0F; 工具页</a>
                <a href="/categories">&#x1F4C2; 智能分类</a>
                <a href="/multi-platform">&#x1F310; 多平台导入</a>
                <a href="/upload">&#x1F4E4; 本地上传</a>
                <div class="menu-divider"></div>
                <a href="https://www.bilibili.com" target="_blank">&#x1F517; 备用网站</a>
                <a href="#" onclick="openLogin();return false">&#x1F511; B站登录</a>
                <a href="#" onclick="openSettings();return false">&#x2699;&#xFE0F; API设置</a>
            </div>
        </div>
        <nav class="topbar-actions">
            <button class="btn btn-outline btn-sm" onclick="openLogin()">&#x1F511; 登录</button>
            <button class="btn btn-outline btn-sm" onclick="openSettings()">&#x2699;&#xFE0F; API设置</button>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="import-layout">

        <!-- Hero / Input -->
        <div class="import-hero">
            <h2>&#x1F30D; 多平台视频导入</h2>
            <p>支持 Bilibili、YouTube 和直链视频，自动提取字幕、AI 总结并存入知识库</p>
            <div class="url-row">
                <input class="input" id="importUrl"
                    placeholder="粘贴 Bilibili / YouTube / 视频直链"
                    oninput="detectPlatform()"
                    onkeydown="if(event.key==='Enter')startImport()">
                <span class="platform-badge unknown" id="platformBadge">&#x2753; 待检测</span>
                <button class="btn btn-primary btn-import" id="importBtn" onclick="startImport()">
                    &#x25B6;&#xFE0F; 导入
                </button>
            </div>
            <div class="option-row">
                <label><input type="checkbox" id="optASR" checked> 无字幕时语音转写</label>
                <label><input type="checkbox" id="optSummary" checked> AI 智能总结</label>
                <label><input type="checkbox" id="optSaveKB" checked> 存入知识库</label>
            </div>
            <div class="platform-hints">
                <span>bilibili.com</span>
                <span>&#xB7;</span>
                <span>youtube.com</span>
                <span>&#xB7;</span>
                <span>youtu.be</span>
                <span>&#xB7;</span>
                <span>直链 .mp4/.mkv</span>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-steps" id="progressSteps">
                <div class="progress-step" id="stepDetect">
                    <div class="step-dot">1</div>
                    <div class="step-label">检测平台</div>
                </div>
                <div class="progress-step" id="stepFetch">
                    <div class="step-dot">2</div>
                    <div class="step-label">获取信息</div>
                </div>
                <div class="progress-step" id="stepSubtitle">
                    <div class="step-dot">3</div>
                    <div class="step-label">提取字幕</div>
                </div>
                <div class="progress-step" id="stepSummary">
                    <div class="step-dot">4</div>
                    <div class="step-label">AI 总结</div>
                </div>
                <div class="progress-step" id="stepSave">
                    <div class="step-dot">5</div>
                    <div class="step-label">存入知识库</div>
                </div>
            </div>
            <div class="progress-message" id="progressMsg"></div>
        </div>

        <!-- Result Preview -->
        <div class="result-section" id="resultSection">
            <div class="result-toolbar">
                <button class="result-tab active" data-tab="summary" onclick="switchResultTab('summary')">&#x1F4DD; AI 总结</button>
                <button class="result-tab" data-tab="transcript" onclick="switchResultTab('transcript')">&#x1F4C4; 转录文本</button>
                <button class="result-tab" data-tab="knowledge" onclick="switchResultTab('knowledge')">&#x1F9E0; 知识点</button>
                <button class="result-tab" data-tab="raw" onclick="switchResultTab('raw')">&#x1F50D; 原始数据</button>
            </div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-actions" id="resultActions">
                <button class="btn btn-primary btn-sm" onclick="viewInKB()">&#x1F4DA; 在知识库中查看</button>
                <button class="btn btn-outline btn-sm" onclick="resetImport()">&#x1F504; 导入新视频</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<script src="/js/common.js"></script>
<script src="/js/api.js"></script>
<script src="/js/enhancements.js"></script>
<script>
    // ==================== State ====================
    var importState = {
        bvid: "",
        title: "",
        author: "",
        platform: "",
        transcript: [],
        summary: null,
        activeTab: "summary"
    };

    // ==================== Platform Detection ====================

    function detectPlatform() {
        var url = document.getElementById("importUrl").value.trim();
        var badge = document.getElementById("platformBadge");
        if (!url) {
            badge.textContent = "❓ 待检测";
            badge.className = "platform-badge unknown";
            return;
        }
        var lc = url.toLowerCase();
        if (lc.includes("bilibili.com") || lc.includes("b23.tv") || /BV[a-zA-Z0-9]{10}/.test(url)) {
            badge.textContent = "📺 Bilibili";
            badge.className = "platform-badge bilibili";
        } else if (lc.includes("youtube.com") || lc.includes("youtu.be")) {
            badge.textContent = "▶️ YouTube";
            badge.className = "platform-badge youtube";
        } else if (/\.(mp4|mkv|webm|mov)(\?|$)/i.test(url)) {
            badge.textContent = "🎬 直链视频";
            badge.className = "platform-badge direct";
        } else {
            badge.textContent = "❓ 待检测";
            badge.className = "platform-badge unknown";
        }
    }

    // ==================== Import Flow ====================

    function startImport() {
        var url = document.getElementById("importUrl").value.trim();
        if (!url) {
            showToast("请粘贴视频链接", "error");
            return;
        }

        // Reset state
        resetProgress();
        hideResult();

        // Options
        var optASR = document.getElementById("optASR").checked;
        var optSummary = document.getElementById("optSummary").checked;
        var optSaveKB = document.getElementById("optSaveKB").checked;

        document.getElementById("progressSection").classList.add("active");
        document.getElementById("importBtn").disabled = true;

        // Rapid platform check: if B站 BV, fast-path for info
        var bv = extractBvid(url);
        if (bv) {
            startBilibiliImport(bv, optSummary, optSaveKB);
        } else {
            startGenericImport(url, optASR, optSummary, optSaveKB);
        }
    }

    function startBilibiliImport(bvid, doSummary, doSaveKB) {
        importState.bvid = bvid;
        importState.platform = "bilibili";

        // Step 1: Detect (already done — we have BV)
        setStepState("stepDetect", "completed");
        // Step 2: Fetch info
        setStepState("stepFetch", "active");
        setProgressMsg("正在获取视频信息...");

        API.fetchVideoInfo(bvid).then(function(data) {
            if (!data.success && data._status !== 200) {
                // Try as success=false but with data from different field
                setStepState("stepFetch", "error");
                setProgressMsg("获取视频信息失败: " + (data.error || "未知错误"));
                finishImportFailed(data.error);
                return;
            }
            var info = data.data || data;
            importState.title = info.title || "";
            importState.author = info.owner_name || info.owner || info.author || "";

            setStepState("stepFetch", "completed");

            // Step 3: Fetch subtitles
            setStepState("stepSubtitle", "active");
            setProgressMsg("正在提取字幕...");

            API.fetchTimedText(bvid).then(function(subData) {
                var hasTranscript = subData && ((subData.data && subData.data.segments && subData.data.segments.length > 0) || (subData.segments && subData.segments.length > 0));
                var segments = (subData && subData.data && subData.data.segments) ? subData.data.segments : (subData && subData.segments ? subData.segments : []);

                if (hasTranscript && segments.length > 0) {
                    importState.transcript = segments;
                }
                setStepState("stepSubtitle", "completed");

                if (doSummary) {
                    // Step 4: AI Summary
                    setStepState("stepSummary", "active");
                    setProgressMsg("正在AI智能总结中...");

                    API.fetchSummarize(bvid, "standard").then(function(sumData) {
                        if (sumData && sumData.success && sumData.data) {
                            importState.summary = sumData.data;
                        } else {
                            // Try alternate format
                            if (sumData && sumData.summary) { importState.summary = sumData.summary; }
                            else if (sumData && sumData.data && !sumData.data.error) { importState.summary = sumData.data; }
                        }
                        setStepState("stepSummary", "completed");

                        if (doSaveKB) {
                            saveToKBThenShow();
                        } else {
                            finishImportSuccess();
                        }
                    }).catch(function(e) {
                        // Summary failed but still may have transcript
                        setStepState("stepSummary", "error");
                        setProgressMsg("总结失败: " + (e.message || "未知错误") + "，已保存字幕");
                        if (doSaveKB) { saveToKBThenShow(); }
                        else { finishImportSuccess(); }
                    });
                } else {
                    setStepState("stepSummary", "completed");
                    if (doSaveKB) { saveToKBThenShow(); }
                    else { finishImportSuccess(); }
                }
            }).catch(function(e) {
                setStepState("stepSubtitle", "error");
                setProgressMsg("字幕提取失败: " + (e.message || "未知错误"));
                // Continue anyway — try summary with just video info
                if (doSummary) {
                    setStepState("stepSummary", "active");
                    setProgressMsg("正在AI智能总结中...");
                    API.fetchSummarize(bvid, "standard").then(function(sumData) {
                        if (sumData && sumData.success && sumData.data) {
                            importState.summary = sumData.data;
                        }
                        setStepState("stepSummary", "completed");
                        if (doSaveKB) { saveToKBThenShow(); }
                        else { finishImportSuccess(); }
                    }).catch(function() {
                        setStepState("stepSummary", "error");
                        if (doSaveKB) { saveToKBThenShow(); }
                        else { finishImportSuccess(); }
                    });
                } else {
                    setStepState("stepSummary", "completed");
                    if (doSaveKB) { saveToKBThenShow(); }
                    else { finishImportSuccess(); }
                }
            });
        }).catch(function(e) {
            setStepState("stepFetch", "error");
            setProgressMsg("获取视频信息失败: " + (e.message || "未知错误"));
            finishImportFailed(e.message);
        });
    }

    function startGenericImport(url, doASR, doSummary, doSaveKB) {
        importState.platform = detectPlatformFromUrl(url);

        // Step 1
        setStepState("stepDetect", "completed");
        setStepState("stepFetch", "active");
        setProgressMsg("正在解析视频链接...");

        // POST to a new generic import endpoint
        var body = {
            url: url,
            use_asr: doASR,
            generate_summary: doSummary,
            save_to_kb: doSaveKB
        };

        API.post("/api/import/url", body, 300000).then(function(data) {
            if (data.success) {
                importState.bvid = data.data && data.data.bvid ? data.data.bvid : "";
                importState.title = data.data && data.data.title ? data.data.title : "";
                importState.author = data.data && data.data.author ? data.data.author : "";
                importState.summary = data.data && data.data.summary ? data.data.summary : null;
                importState.transcript = data.data && data.data.transcript ? data.data.transcript : [];

                setStepState("stepFetch", "completed");
                setStepState("stepSubtitle", "completed");
                setStepState("stepSummary", "completed");
                setStepState("stepSave", "completed");
                setProgressMsg("导入完成");
                showResult();
            } else {
                finishImportFailed(data.error);
            }
        }).catch(function(e) {
            finishImportFailed(e.message || "导入失败");
        });
    }

    function saveToKBThenShow() {
        setStepState("stepSave", "active");
        setProgressMsg("正在存入知识库...");

        API.fetchKBSave(importState.bvid).then(function(kbData) {
            if (kbData.success) {
                setStepState("stepSave", "completed");
                var d = kbData.data || {};
                if (d.partsTotal > 1) {
                    var allOk = d.partsOk === d.partsTotal;
                    setProgressMsg("导入完成！已导入 " + d.partsOk + "/" + d.partsTotal + " 页");
                    showToast("已导入 " + d.partsOk + "/" + d.partsTotal + " 页", allOk ? "success" : "warning", 5000);
                } else {
                    setProgressMsg("导入完成！已存入知识库");
                }
            } else {
                setStepState("stepSave", "error");
                setProgressMsg("知识库保存失败: " + (kbData.error || "" + "，但视频已处理"));
            }
            finishImportSuccess();
        }).catch(function(e) {
            setStepState("stepSave", "error");
            setProgressMsg("知识库保存失败");
            finishImportSuccess();
        });
    }

    function finishImportSuccess() {
        document.getElementById("importBtn").disabled = false;
        showResult();
    }

    function finishImportFailed(errMsg) {
        document.getElementById("importBtn").disabled = false;
        setProgressMsg("导入失败: " + (errMsg || "未知错误"));
        showToast("导入失败: " + (errMsg || "未知错误"), "error", 6000);
    }

    // ==================== Progress UI ====================

    function resetProgress() {
        ["stepDetect","stepFetch","stepSubtitle","stepSummary","stepSave"].forEach(function(id) {
            setStepState(id, "");
        });
        setProgressMsg("");
        document.getElementById("progressSection").classList.add("active");
    }

    function setStepState(stepId, state) {
        var el = document.getElementById(stepId);
        if (!el) return;
        el.className = "progress-step";
        if (state) { el.classList.add(state); }
    }

    function setProgressMsg(msg) {
        document.getElementById("progressMsg").textContent = msg;
    }

    // ==================== Result Display ====================

    function showResult() {
        document.getElementById("resultSection").classList.add("active");
        switchResultTab("summary");
    }

    function hideResult() {
        document.getElementById("resultSection").classList.remove("active");
        document.getElementById("resultBody").innerHTML = "";
    }

    function switchResultTab(tab) {
        importState.activeTab = tab;
        // Update active tab styling
        document.querySelectorAll(".result-tab").forEach(function(t) {
            t.classList.toggle("active", t.dataset.tab === tab);
        });
        renderResultTab(tab);
    }

    function renderResultTab(tab) {
        var body = document.getElementById("resultBody");
        var title = importState.title || "视频";
        var author = importState.author || "";
        var summary = importState.summary;
        var transcript = importState.transcript;

        var metaHtml = '<div class="result-meta">' +
            '<span class="video-title">' + escapeHtml(title) + '</span>' +
            (author ? '<span>' + escapeHtml(author) + '</span>' : '') +
            (importState.bvid ? '<span>BV: ' + escapeHtml(importState.bvid) + '</span>' : '') +
            (importState.platform ? '<span class="platform-badge ' + importState.platform + '">' + escapeHtml(importState.platform) + '</span>' : '') +
            '</div>';

        if (tab === "summary") {
            body.innerHTML = metaHtml;
            if (summary) {
                var html = "";
                if (summary.overview) {
                    html += '<div class="result-overview">' + escapeHtml(summary.overview) + '</div>';
                }
                if (summary.coreConclusions && summary.coreConclusions.length > 0) {
                    html += '<div class="result-section-title">🎯 核心结论</div>';
                    html += '<ul class="result-list">' + summary.coreConclusions.map(function(c) {
                        return '<li>' + escapeHtml(c) + '</li>';
                    }).join("") + '</ul>';
                }
                if (summary.logicFlow && summary.logicFlow.length > 0) {
                    html += '<div class="result-section-title">📈 逻辑脉络</div>';
                    summary.logicFlow.forEach(function(item) {
                        html += '<div class="result-logic-flow-item">' +
                            '<strong>' + escapeHtml(item.title || '') + '</strong>' +
                            (item.title ? '：' : '') +
                            escapeHtml(item.explanation || '') +
                            '</div>';
                    });
                }
                if (summary.knowledgeTree && summary.knowledgeTree.length > 0) {
                    html += '<div class="result-section-title">🌳 知识点</div>';
                    summary.knowledgeTree.forEach(function(kt) {
                        html += '<strong>' + escapeHtml(kt.topic || '未命名知识点') + '</strong>';
                        html += '<ul class="result-list">' + (kt.points || []).map(function(p) {
                            return '<li>' + escapeHtml(p) + '</li>';
                        }).join("") + '</ul>';
                    });
                }
                if (html) {
                    body.innerHTML += html;
                } else {
                    body.innerHTML += '<div class="result-empty">总结内容已生成，但结构不可识别。请切换到“原始数据”查看完整内容。</div>';
                }
            } else {
                body.innerHTML += '<div class="result-empty">暂无AI总结内容。' +
                    (transcript.length > 0 ? '请切换到“转录文本”查看字幕。' : '') +
                    '</div>';
            }
        } else if (tab === "transcript") {
            body.innerHTML = metaHtml;
            if (transcript && transcript.length > 0) {
                var tHtml = '<div class="transcript-list">';
                transcript.forEach(function(seg) {
                    var text = seg.text || seg.content || seg.line || "";
                    var time = seg.timestamp || seg.start_time || (seg.start ? formatDuration(seg.start) : "");
                    tHtml += '<div class="transcript-item">' +
                        '<span class="transcript-time">' + escapeHtml(time) + '</span>' +
                        '<span class="transcript-text">' + escapeHtml(text) + '</span>' +
                        '</div>';
                });
                tHtml += '</div>';
                body.innerHTML += tHtml;
            } else {
                body.innerHTML += '<div class="result-empty">暂无转录文本。该视频可能没有字幕，或字幕提取失败。</div>';
            }
        } else if (tab === "knowledge") {
            body.innerHTML = metaHtml;
            if (summary) {
                var kHtml = "";
                if (summary.knowledgeTree && summary.knowledgeTree.length > 0) {
                    summary.knowledgeTree.forEach(function(kt) {
                        kHtml += '<div class="result-section-title">📌 ' + escapeHtml(kt.topic || '知识点') + '</div>';
                        kHtml += '<ul class="result-list">' + (kt.points || []).map(function(p) {
                            return '<li>' + escapeHtml(p) + '</li>';
                        }).join("") + '</ul>';
                    });
                }
                if (summary.terms && summary.terms.length > 0) {
                    kHtml += '<div class="result-section-title">📖 术语表</div>';
                    kHtml += '<ul class="result-list">' + summary.terms.map(function(t) {
                        return '<li><strong>' + escapeHtml(t.term || '') + '</strong>' +
                            (t.definition ? ': ' + escapeHtml(t.definition) : '') + '</li>';
                    }).join("") + '</ul>';
                }
                if (summary.reviewQuestions && summary.reviewQuestions.length > 0) {
                    kHtml += '<div class="result-section-title">❓ 复习问题</div>';
                    kHtml += '<ul class="result-list">' + summary.reviewQuestions.map(function(q) {
                        return '<li>' + escapeHtml(q) + '</li>';
                    }).join("") + '</ul>';
                }
                if (kHtml) {
                    body.innerHTML += kHtml;
                } else {
                    body.innerHTML += '<div class="result-empty">暂无知识点数据。</div>';
                }
            } else {
                body.innerHTML += '<div class="result-empty">暂无知识点数据。</div>';
            }
        } else if (tab === "raw") {
            body.innerHTML = metaHtml;
            var rawObj = {
                bvid: importState.bvid,
                platform: importState.platform,
                title: importState.title,
                author: importState.author,
                transcript_count: importState.transcript ? importState.transcript.length : 0,
                summary: importState.summary,
                transcript: importState.transcript
            };
            body.innerHTML += '<pre style="font-size:12px;white-space:pre-wrap;background:var(--neutral-50);padding:16px;border-radius:var(--radius-md);max-height:calc(100vh - 340px);overflow-y:auto">' +
                escapeHtml(JSON.stringify(rawObj, null, 2)) + '</pre>';
        }
    }

    // ==================== Actions ====================

    function viewInKB() {
        if (importState.bvid) {
            location.href = '/kb?highlight=' + encodeURIComponent(importState.bvid);
        } else {
            location.href = '/kb';
        }
    }

    function resetImport() {
        hideResult();
        resetProgress();
        document.getElementById("progressSection").classList.remove("active");
        document.getElementById("importUrl").value = "";
        document.getElementById("platformBadge").textContent = "❓ 待检测";
        document.getElementById("platformBadge").className = "platform-badge unknown";
        importState = { bvid: "", title: "", author: "", platform: "", transcript: [], summary: null, activeTab: "summary" };
        document.getElementById("importUrl").focus();
    }

    // ==================== Helpers ====================

    function detectPlatformFromUrl(url) {
        var lc = url.toLowerCase();
        if (lc.includes("bilibili.com") || lc.includes("b23.tv") || /BV[a-zA-Z0-9]{10}/.test(url)) {
            return "bilibili";
        } else if (lc.includes("youtube.com") || lc.includes("youtu.be")) {
            return "youtube";
        } else if (/\.(mp4|mkv|webm|mov)(\?|$)/i.test(url)) {
            return "direct";
        }
        return "unknown";
    }

    // ==================== Init ====================

    document.addEventListener("DOMContentLoaded", function() {
        // Auto-focus the URL input
        document.getElementById("importUrl").focus();

        // Check URL params for pre-filled bvid
        var params = new URLSearchParams(window.location.search);
        var urlParam = params.get("url") || params.get("bvid") || "";
        if (urlParam) {
            document.getElementById("importUrl").value = urlParam;
            detectPlatform();
        }
    });
</script>
